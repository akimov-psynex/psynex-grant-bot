name: Psynex Grant Bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic requests

      - name: Run grant bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

      - name: Save seen grants
        run: |
          git config user.name "grant-bot"
          git config user.email "bot@psynex.app"
          git add seen_grants.json
          git diff --staged --quiet || git commit -m "update seen grants $(date '+%Y-%m-%d')" && git push
